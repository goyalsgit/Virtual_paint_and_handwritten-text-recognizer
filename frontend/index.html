<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Drawing — Hand Gesture Text Recognizer</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>

  <!-- Loading overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <h2>Loading hand tracking...</h2>
    <p style="color:#333;font-size:12px;margin-top:4px">Allow camera access when prompted</p>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- TOOLBAR                                                     -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="toolbar">

    <!-- Group 1: Colors -->
    <div class="tb-group" id="color-btns"></div>

    <div class="tb-divider"></div>

    <!-- Group 2: Drawing tools -->
    <div class="tb-group">
      <button class="tool-btn icon-only" id="btn-erase" title="Eraser">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/><path d="M6.5 17.5l3-3"/>
        </svg>
      </button>
      <button class="tool-btn icon-only" id="btn-undo" title="Undo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7v6h6"/><path d="M3 13C5 7 11 4 17 6s9 8 7 14"/>
        </svg>
      </button>
      <button class="tool-btn icon-only" id="btn-redo" title="Redo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 7v6h-6"/><path d="M21 13C19 7 13 4 7 6S-2 14 0 20"/>
        </svg>
      </button>
      <button class="tool-btn icon-only danger" id="btn-clear" title="Clear canvas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>

    <div class="tb-divider"></div>

    <!-- Group 3: Brush size -->
    <div class="tb-group">
      <div class="brush-control">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
        <input type="range" id="brush-range" min="2" max="28" value="10" />
        <span id="brush-val">10px</span>
      </div>
    </div>

    <div class="tb-divider"></div>

    <!-- Group 4: OCR controls -->
    <div class="tb-group">
      <select class="ocr-select" id="ocr-mode" title="OCR mode">
        <option value="sentence">Sentence</option>
        <option value="continuous">Continuous</option>
        <option value="line">Line</option>
        <option value="word">Word</option>
      </select>
      <button class="tool-btn" id="btn-ocr" title="Run OCR on visible area" style="border-color:#223366;color:#6688cc">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h6M7 16h8"/>
        </svg>
        OCR
      </button>
      <button class="tool-btn" id="btn-ocr-all" title="OCR entire canvas" style="border-color:#223366;color:#4466aa">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="2"/><path d="M7 7h10M7 11h6M7 15h8"/>
        </svg>
        OCR All
      </button>
    </div>

    <div class="tb-divider"></div>

    <!-- Group 5: Canvas controls -->
    <div class="tb-group">
      <button class="tool-btn icon-only" id="btn-focus" title="Focus / whiteboard mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
        </svg>
      </button>
      <button class="tool-btn icon-only" id="btn-reset-view" title="Reset canvas view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
        </svg>
      </button>
      <button class="tool-btn icon-only" id="btn-download" title="Download canvas as PNG">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <a class="tool-btn pdf-btn" id="btn-pdf-viewer" href="/pdfviewer" title="Open AirDoc PDF Viewer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15l2 2 4-4"/>
        </svg>
        AirDoc
      </a>
    </div>

    <div class="tb-divider"></div>

    <!-- Group 6: Status -->
    <div class="tb-group">
      <span id="conn-status" class="disconnected">● Offline</span>
      <span id="pan-indicator">0% 0%</span>
    </div>

    <!-- Dev panel toggle -->
    <button class="tool-btn" id="dev-toggle" title="Training sample controls" style="margin-left:auto;color:#444;border-color:#1a1a28">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
        <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
      </svg>
      Dev
    </button>

  </div>

  <!-- Dev panel (collapsible) -->
  <div id="dev-panel">
    <span class="tb-label">Training sample</span>
    <input class="label-input" id="sample-label" type="text" placeholder="Correct label for this drawing" />
    <button class="tool-btn" id="btn-save-sample" style="border-color:#1a3322;color:#448866">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
      Save Sample
    </button>
    <span class="sample-status" id="sample-status">No sample saved yet</span>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- CANVAS AREA                                                 -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="canvas-wrapper">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="draw-canvas"></canvas>
    <canvas id="overlay-canvas"></canvas>

    <!-- Floating mode badge -->
    <div id="mode-label" style="color:#555">◌ READY</div>

    <!-- Canvas minimap -->
    <div id="minimap">
      <canvas id="minimap-canvas"></canvas>
      <div id="minimap-viewport"></div>
    </div>

    <div id="hand-loss-indicator">Hand tracking lost...</div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- OCR RESULT BAR                                              -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="ocr-bar">
    <span id="ocr-bar-label">Recognized</span>
    <span id="ocr-text"></span>
    <button id="btn-copy-ocr" title="Copy to clipboard">Copy</button>
    <button id="btn-history-toggle" title="Show OCR history">History</button>
    <button id="btn-dismiss-ocr" title="Dismiss">✕</button>
  </div>

  <!-- OCR History panel -->
  <div id="history-panel">
    <div id="history-header">
      <span>OCR History</span>
      <div style="display:flex;gap:6px">
        <button id="btn-export-history" title="Export as .txt">Export</button>
        <button id="btn-clear-history" title="Clear history">Clear</button>
        <button id="btn-history-close">✕</button>
      </div>
    </div>
    <div id="history-list"><div class="history-empty">No results yet</div></div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- STATUS BAR — Gesture hints                                  -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="status-bar">
    <span class="gesture-hint">☝ Index = Draw</span>
    <span class="gesture-hint">✌ Index+Middle = Lift pen</span>
    <span class="gesture-hint">🤟 3 Fingers = Pan</span>
    <span class="gesture-hint">✊ Fist = Erase</span>
    <span class="gesture-hint">⏱ Auto-OCR after 3.5s idle</span>
  </div>

  <script type="module" src="/static/js/app.js"></script>

  <script>
    // ── Onboarding overlay ───────────────────────────────────────
    const ONBOARDING_KEY = "airdraw_onboarded_v1";
    const steps = [
      { icon: "☝️", title: "Draw with your index finger", desc: "Point your index finger up and move it to draw on the canvas." },
      { icon: "✌️", title: "Lift your pen", desc: "Raise index + middle finger to lift the pen and reposition without drawing." },
      { icon: "🤟", title: "Pan the canvas", desc: "Raise index + middle + ring fingers to scroll around the large virtual canvas." },
      { icon: "✊", title: "Erase & Auto-OCR", desc: "Make a fist to erase. The app also auto-recognizes your writing after 3.5s of inactivity." },
    ];

    function buildOnboarding() {
      const overlay = document.createElement("div");
      overlay.id = "onboarding";
      overlay.innerHTML = `
        <div id="onboarding-card">
          <div id="onboarding-step-icon"></div>
          <h2 id="onboarding-step-title"></h2>
          <p id="onboarding-step-desc"></p>
          <div id="onboarding-dots"></div>
          <div id="onboarding-actions">
            <button id="onboarding-prev">← Back</button>
            <button id="onboarding-next">Next →</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);

      let current = 0;
      const icon  = overlay.querySelector("#onboarding-step-icon");
      const title = overlay.querySelector("#onboarding-step-title");
      const desc  = overlay.querySelector("#onboarding-step-desc");
      const dots  = overlay.querySelector("#onboarding-dots");
      const prev  = overlay.querySelector("#onboarding-prev");
      const next  = overlay.querySelector("#onboarding-next");

      function render() {
        const s = steps[current];
        icon.textContent  = s.icon;
        title.textContent = s.title;
        desc.textContent  = s.desc;
        dots.innerHTML = steps.map((_, i) =>
          `<span class="ob-dot${i === current ? " active" : ""}"></span>`
        ).join("");
        prev.style.visibility = current === 0 ? "hidden" : "visible";
        next.textContent = current === steps.length - 1 ? "Get Started" : "Next →";
      }

      prev.addEventListener("click", () => { if (current > 0) { current--; render(); } });
      next.addEventListener("click", () => {
        if (current < steps.length - 1) { current++; render(); }
        else {
          localStorage.setItem(ONBOARDING_KEY, "1");
          overlay.classList.add("fade-out");
          setTimeout(() => overlay.remove(), 400);
        }
      });
      render();
    }

    if (!localStorage.getItem(ONBOARDING_KEY)) buildOnboarding();

    // ── Dev panel toggle ─────────────────────────────────────────
    document.getElementById("dev-toggle").addEventListener("click", () => {
      document.getElementById("dev-panel").classList.toggle("open");
      document.getElementById("dev-toggle").classList.toggle("active");
    });

    // ── OCR bar: copy + dismiss + history ────────────────────────
    document.getElementById("btn-copy-ocr").addEventListener("click", () => {
      const text = document.getElementById("ocr-text").textContent;
      if (!text || text === "Recognizing..." || text === "Scanning full canvas...") return;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById("btn-copy-ocr");
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1500);
      });
    });

    document.getElementById("btn-dismiss-ocr").addEventListener("click", () => {
      const bar = document.getElementById("ocr-bar");
      bar.classList.remove("visible");
      bar.style.display = "none";
    });

    // ── OCR History panel ────────────────────────────────────────
    const historyPanel = document.getElementById("history-panel");
    const historyList  = document.getElementById("history-list");
    let ocrHistory = [];

    document.getElementById("btn-history-toggle").addEventListener("click", () => {
      historyPanel.classList.toggle("open");
    });
    document.getElementById("btn-history-close").addEventListener("click", () => {
      historyPanel.classList.remove("open");
    });
    document.getElementById("btn-clear-history").addEventListener("click", () => {
      ocrHistory = [];
      historyList.innerHTML = `<div class="history-empty">No results yet</div>`;
    });
    document.getElementById("btn-export-history").addEventListener("click", () => {
      if (!ocrHistory.length) return;
      const text = ocrHistory.map(e => `[${e.time}] ${e.text}`).join("\n");
      const link = document.createElement("a");
      link.download = `airdraw_ocr_${Date.now()}.txt`;
      link.href = "data:text/plain;charset=utf-8," + encodeURIComponent(text);
      link.click();
    });

    window.addOcrToHistory = function(text) {
      if (!text || text === "Recognizing..." || text === "Scanning full canvas...") return;
      const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      ocrHistory.unshift({ text, time });
      const empty = historyList.querySelector(".history-empty");
      if (empty) empty.remove();
      const item = document.createElement("div");
      item.className = "history-item";
      item.innerHTML = `
        <span class="history-time">${time}</span>
        <span class="history-text">${text}</span>
        <button class="history-copy" title="Copy">⎘</button>`;
      item.querySelector(".history-copy").addEventListener("click", () => {
        navigator.clipboard.writeText(text);
      });
      historyList.prepend(item);
    };

    // ── MutationObserver to sync OCR bar visibility class ────────
    const _ocrBar = document.getElementById("ocr-bar");
    new MutationObserver(() => {
      if (_ocrBar.style.display === "block" || _ocrBar.style.display === "flex") {
        _ocrBar.classList.add("visible");
      }
    }).observe(_ocrBar, { attributes: true, attributeFilter: ["style"] });
  </script>

</body>
</html>
